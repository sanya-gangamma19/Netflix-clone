<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: white;
}

/* Hero */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    padding-left: 50px;
    background-size: cover;
    background-position: center;
    animation: fadeIn 1s ease;
}
/* Buttons */
.lang-btn {
    margin: 10px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid white;
    color: white;
    transition: 0.3s;
}

.lang-btn:hover {
    background: red;
}
</style>
</head>

<body>

<div class="hero" id="hero">
  <div>
    <h1 id="title">Movie</h1>
    <p>Select Language</p>

    <button class="lang-btn">English</button>
    <button class="lang-btn">Hindi</button>
    <button class="lang-btn">Kannada</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const movie = params.get("movie");

const title = document.getElementById("title");
const hero = document.getElementById("hero");

if(movie === "stranger") {
    title.innerText = "Stranger Things";
    hero.style.backgroundImage = "linear-gradient(to top, black, transparent), url('images.jpg')";
}
else if(movie === "hridayam") {
    title.innerText = "Hridayam";
    hero.style.backgroundImage = "linear-gradient(to top, black, transparent), url('images/movie1.jpg')";
}
else if(movie === "hinanna") {
    title.innerText = "Hi Nanna";
    hero.style.backgroundImage = "linear-gradient(to top, black, transparent), url('images/movie2.jpg')";
}
else if(movie === "durandhar") {
    title.innerText = "Durandhar";
    hero.style.backgroundImage = "linear-gradient(to top, black, transparent), url('images/movie3.jpg')";
}
else if(movie === "yjhd") {
    title.innerText = "Yeh Jawaani Hai Deewani";
    hero.style.backgroundImage = "linear-gradient(to top, black, transparent), url('images/movie4.jpg')";
}
else if(movie === "kungfu") {
    title.innerText = "Kung Fu Panda 4";
    hero.style.backgroundImage = "linear-gradient(to top, black, transparent), url('images/movie5.jpg')";
}
</script>
<button onclick="goBack()" class="btn btn-light">⬅ Back</button>

<script>
function goBack() {
    window.history.back();
}
</script>

</body>
</html>
