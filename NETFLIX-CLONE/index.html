<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark fixed-top px-4">
  <span class="navbar-brand text-danger fw-bold">NETFLIX</span>
</nav>

<!-- Banner -->
<header class="banner d-flex align-items-center">
  <div class="container text-white">
    <h1 class="title">Stranger Things</h1>
    <p class="desc">A love letter to the 80s classics.</p>
    <button class="btn btn-light">▶ Play</button>
  </div>
</header>
<section class="container mt-4">
  <h3>Continue Watching</h3>
  <div class="movie-container">
    <img src="images.jpg" class="movie-card">
    <img src="image2.jpg" class="movie-card">
  </div>
</section>

<!-- Movie Section -->
<section class="container mt-5">
  <h3>Trending Now</h3>

  <div class="movie-container">

  <div class="movie-wrapper">
    <a href="movie.html?movie=hridayam">
      <img src="images/movie1.jpg" class="movie-card">
      <div class="overlay">
        <button class="btn btn-light btn-sm">▶ Play</button>
      </div>
    </a>
  </div>

  <div class="movie-wrapper">
    <a href="movie.html?movie=hi nanna">
      <img src="images/movie2.jpg" class="movie-card">
    </a>
  </div>

  <div class="movie-wrapper">
    <a href="movie.html?movie=durandhar">
      <img src="images/movie3.jpg" class="movie-card">
    </a>
  </div>

  <div class="movie-wrapper">
    <a href="movie.html?movie=yeh jawaani">
      <img src="images/movie4.jpg" class="movie-card">
    </a>
  </div>
  <div class="movie-wrapper">
    <a href="movie.html?movie=Kung fu">
      <img src="images/movie5.jpg" class="movie-card">
    </a>
  </div>

</div>
</section>

</body>
</html>
